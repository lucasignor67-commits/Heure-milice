<meta charset="utf-8">
<title>Heures de service — Consultation</title>

<script>
const GS_URL = "https://script.google.com/macros/s/AKfycbzBe7mmsiIY21I1yK5YbO-900GrCwvibx2wk5GeF0DfoA2fMote-_fVrbc-d2zO-oY8uA/exec";
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230B0B0B'/%3E%3Ccircle cx='50' cy='50' r='40' fill='none' stroke='%2316C784' stroke-width='7'/%3E%3Cg fill='none' stroke='%23FFFFFF' stroke-width='9' stroke-linejoin='round' stroke-linecap='round'%3E%3Cpath d='M35 50 h30'/%3E%3Cpath d='M50 35 v30'/%3E%3C/g%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#0B0B0B; --surface:#1B1B1D; --surface2:#242427;
  --ink:#F2F2F2; --muted:#8E9490; --line:#2C2C2F;
  --accent:#16C784; --accent-ink:#FFFFFF; --accent-soft:#123526;
  --warn:#D9A441;
  --mono:ui-monospace,"Cascadia Mono",Consolas,Menlo,monospace;
}
*{box-sizing:border-box}
body{
  margin:0; background:var(--bg); color:var(--ink);
  font:15px/1.5 "Segoe UI",system-ui,-apple-system,sans-serif;
}
.wrap{max-width:820px; margin:0 auto; padding:28px 20px 80px; display:flex; flex-direction:column; gap:22px}
header h1{margin:0; font-size:26px; font-weight:700; letter-spacing:-.01em}
header p{margin:6px 0 0; color:var(--muted); max-width:62ch}
.badge-ro{
  display:inline-block; margin-top:10px;
  font:600 11.5px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase;
  color:var(--accent); background:var(--accent-soft);
  border:1px solid transparent; border-radius:99px; padding:7px 12px;
}
.label{
  display:block; font-size:11.5px; font-weight:600; letter-spacing:.08em;
  text-transform:uppercase; color:var(--muted); margin-bottom:8px;
}
.panel{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px 16px}
input[type=url]{
  width:100%; background:var(--surface2); color:var(--ink);
  border:1px solid var(--line); border-radius:6px; padding:10px 12px;
  font:12.5px/1.5 var(--mono);
}
input[type=url]:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent}
.hint{margin:8px 0 0; font-size:12.5px; color:var(--muted)}
.toolbar{display:flex; flex-wrap:wrap; align-items:center; gap:12px}
.toolbar input[type=search]{
  flex:1; min-width:200px; background:var(--surface); color:var(--ink);
  border:1px solid var(--line); border-radius:6px; padding:9px 12px; font-size:14px;
}
.toolbar input[type=search]:focus{outline:2px solid var(--accent); outline-offset:1px}
.btn{
  font:700 12.5px "Segoe UI",system-ui,sans-serif; padding:10px 16px; border-radius:10px;
  text-transform:uppercase; letter-spacing:.05em;
  background:var(--accent); color:var(--accent-ink); border:none; cursor:pointer;
}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.6; cursor:default}
.status{font-size:12.5px; color:var(--muted)}
.status.err{color:var(--warn)}
.tablebox{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow-x:auto}
table{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums}
th,td{padding:9px 14px; text-align:left; border-top:1px solid var(--line); white-space:nowrap}
thead th{
  border-top:none; font-size:11.5px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--muted); background:var(--surface2); position:sticky; top:0;
}
td.mat{font:700 14px var(--mono); color:var(--accent); width:1%}
td.time{font:600 13.5px var(--mono)}
td.name{font-weight:600}
tr.zero td{color:var(--muted)}
tr.zero td.name{font-weight:400}
tr.zero td.mat{color:var(--muted)}
.empty{padding:26px 16px; color:var(--muted); text-align:center}
footer{color:var(--muted); font-size:12.5px}
</style>

<div class="wrap">
<header>
  <h1>Heures de service — consultation</h1>
  <p>Cette page affiche les heures telles qu'elles ont été envoyées dans le Google Sheet. Elle est en lecture seule : rien ne peut y être modifié.</p>
  <span class="badge-ro">🔒 Lecture seule</span>
</header>

<section>
  <div class="toolbar" style="margin-bottom:12px">
    <input type="search" id="search" placeholder="Rechercher un matricule ou un nom…" aria-label="Rechercher">
    <span class="status" id="status">—</span>
    <button id="refresh" class="btn" type="button">🔄 Actualiser</button>
  </div>
  <p class="status" id="lastMaj" style="margin:0 0 12px"></p>
  <div class="tablebox">
    <table>
      <thead><tr id="headRow"><th>Matricule</th><th>Nom</th><th>Temps</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg">Chargement…</div>
  </div>
</section>

</div>

<script>
"use strict";
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* L'adresse du script Google (GS_URL) est déclarée EN HAUT du fichier.
   Si jamais elle était vide, la page reprend celle enregistrée par la
   page « Classement service » dans ce navigateur. */
function getUrl(){
  if(GS_URL.trim()) return GS_URL.trim();
  try{ return (localStorage.getItem("gsUrl")||"").trim(); }catch(e){ return ""; }
}

let data=[];          // lignes du Sheet (sans l'en-tête)
let enCours=false;

function setStatus(msg, err){
  const el=$("status");
  el.textContent=msg;
  el.classList.toggle("err",!!err);
}

async function charger(){
  const url=getUrl();
  const empty=$("emptyMsg");
  if(!url){
    data=[]; render();
    empty.hidden=false;
    empty.textContent="Adresse du script Google non configurée — ouvre d'abord la page « Classement service » sur ce navigateur, ou demande à intégrer l'adresse dans cette page.";
    setStatus("—");
    return;
  }
  if(enCours) return;
  enCours=true;
  setStatus("⏳ Chargement…");
  $("refresh").disabled=true;
  try{
    const res=await fetch(url,{method:"GET"});
    const j=await res.json();
    if(!j || !j.ok || !Array.isArray(j.rows)) throw new Error("réponse inattendue");
    const rows=j.rows.map(r=>r.map(v=>String(v==null?"":v)));
    // première ligne = en-têtes si elle ressemble à des titres
    let head=["Matricule","Nom","Temps"];
    let corps=rows;
    if(rows.length && rows[0].some(c=>/matricule|nom|temps/i.test(c))){
      head=rows[0]; corps=rows.slice(1);
    }
    $("headRow").innerHTML=head.map(h=>`<th>${esc(h)}</th>`).join("");
    data=corps;
    render();
    setStatus("✓ À jour — "+new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"}));
    // date de la dernière mise à jour du doc (fournie par le script Google)
    if(j.maj){
      const d=new Date(j.maj);
      $("lastMaj").textContent="📄 Dernière mise à jour du doc : "+
        d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})+
        " à "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    }else{
      $("lastMaj").textContent="";
    }
  }catch(e){
    setStatus("Échec du chargement — vérifie l'adresse du script (doGet installé ?)",true);
    if(!data.length){
      $("emptyMsg").hidden=false;
      $("emptyMsg").textContent="Impossible de lire le Google Sheet. Vérifie l'adresse du script et que la fonction doGet est bien installée (voir mode d'emploi).";
    }
  }
  enCours=false;
  $("refresh").disabled=false;
}

function render(){
  const q=$("search").value.trim().toLowerCase();
  const shown=data.filter(r=>!q || r.join(" ").toLowerCase().includes(q));
  $("tbody").innerHTML=shown.map(r=>{
    const zero = (r[2]||"").trim()==="/" || (r[2]||"").trim()==="0";
    const cells=r.map((c,i)=>{
      const cls = i===0?"mat" : i===1?"name" : i===2?"time" : "";
      return `<td class="${cls}">${esc(c)}</td>`;
    }).join("");
    return `<tr class="${zero?"zero":""}">${cells}</tr>`;
  }).join("");
  const empty=$("emptyMsg");
  empty.hidden=shown.length>0;
  if(!shown.length && data.length) empty.textContent="Aucun résultat pour cette recherche.";
  else if(!shown.length) empty.textContent="Le Google Sheet est vide pour le moment.";
}

$("search").addEventListener("input",render);
$("refresh").addEventListener("click",charger);
setInterval(charger, 120000);   // rafraîchissement auto toutes les 2 minutes
charger();
</script>
